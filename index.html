<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>App Cashback</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .box { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
    input, button { padding: 8px; margin: 5px; }
    button { cursor: pointer; }
  </style>
</head>
<body>

<h2>💰 Sistema de Cashback</h2>

<div class="box">
  <h3>Cadastro de Cliente</h3>
  <input type="text" id="nome" placeholder="Nome">
  <input type="text" id="cpf" placeholder="CPF">
  <button onclick="cadastrar()">Cadastrar</button>
</div>

<div class="box">
  <h3>Definir Cashback (%)</h3>
  <input type="number" id="porcentagem" min="5" max="20" value="5">
  <button onclick="definirPorcentagem()">Aplicar</button>
  <p id="percentAtual">Atual: 5%</p>
</div>

<div class="box">
  <h3>Registrar Compra</h3>
  <input type="text" id="cpfCompra" placeholder="CPF">
  <input type="number" id="valorCompra" placeholder="Valor R$">
  <button onclick="comprar()">Registrar</button>
</div>

<div class="box">
  <h3>Resgatar Cashback</h3>
  <input type="text" id="cpfResgate" placeholder="CPF">
  <button onclick="resgatar()">Resgatar</button>
</div>

<div class="box">
  <h3>Clientes</h3>
  <ul id="listaClientes"></ul>
</div>

<script>
let clientes = [];
let porcentagem = 5;

function cadastrar() {
  let nome = document.getElementById("nome").value;
  let cpf = document.getElementById("cpf").value;

  if (!nome || !cpf) {
    alert("Preencha os dados!");
    return;
  }

  clientes.push({ nome, cpf, saldo: 0 });
  atualizarLista();
}

function definirPorcentagem() {
  let valor = parseFloat(document.getElementById("porcentagem").value);

  if (valor < 5 || valor > 20) {
    alert("Entre 5% e 20%");
    return;
  }

  porcentagem = valor;
  document.getElementById("percentAtual").innerText = "Atual: " + porcentagem + "%";
}

function comprar() {
  let cpf = document.getElementById("cpfCompra").value;
  let valor = parseFloat(document.getElementById("valorCompra").value);

  let cliente = clientes.find(c => c.cpf === cpf);

  if (!cliente) {
    alert("Cliente não encontrado!");
    return;
  }

  let cashback = valor * (porcentagem / 100);
  cliente.saldo += cashback;

  alert("Cashback gerado: R$ " + cashback.toFixed(2));
  atualizarLista();
}

function resgatar() {
  let cpf = document.getElementById("cpfResgate").value;

  let cliente = clientes.find(c => c.cpf === cpf);

  if (!cliente) {
    alert("Cliente não encontrado!");
    return;
  }

  alert("Resgatado: R$ " + cliente.saldo.toFixed(2));
  cliente.saldo = 0;

  atualizarLista();
}

function atualizarLista() {
  let lista = document.getElementById("listaClientes");
  lista.innerHTML = "";

  clientes.forEach(c => {
    let li = document.createElement("li");
    li.innerText = `${c.nome} - CPF: ${c.cpf} - Saldo: R$ ${c.saldo.toFixed(2)}`;
    lista.appendChild(li);
  });
}
</script>

</body>
</html>
